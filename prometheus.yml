global:
  scrape_interval: 15s

scrape_configs:
  # 🔹 Backend (FastAPI metrics)
  - job_name: "backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  # 🔹 Node Exporter (system metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
